# Render Blueprint - Infrastructure as Code
# This file tells Render how to build and deploy the backend.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: learntrack-api
    runtime: docker
    branch: main
    # rootDir sets the Docker build context to backend/
    rootDir: ./backend
    # dockerfilePath is relative to rootDir
    dockerfilePath: ./Dockerfile
    plan: free
    # Wait for GitHub Actions CI checks to pass before deploying
    autoDeployTrigger: checksPass
    # Zero-downtime deploy health check
    healthCheckPath: /health
    # Non-secret environment variables
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: WEB_CONCURRENCY
        value: "1"
      # Secrets: set these in Render dashboard, NOT here.
      # - SECRET_KEY (required, 32+ chars random string)
      # - MONGODB_URL
      # - DATABASE_NAME
      # - CLERK_SECRET_KEY
      # - CLERK_PUBLISHABLE_KEY
      # - CLERK_JWT_ISSUER
      # - CLERK_JWT_AUDIENCE
      # - CLERK_WEBHOOK_SECRET
      # - OPENAI_API_KEY (if using)
      # - GROQ_API_KEY (if using)
      # - QDRANT_URL (if using)
      # - QDRANT_API_KEY (if using)
      # - UPLOADTHING_SECRET
      # - UPLOADTHING_APP_ID
      # - BACKEND_CORS_ORIGINS (your Vercel frontend URL)
